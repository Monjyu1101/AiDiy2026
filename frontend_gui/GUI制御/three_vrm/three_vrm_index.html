<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AiDiy GUI</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js",
        "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.0.0/lib/three-vrm-animation.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";
    import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from "@pixiv/three-vrm-animation";

    const params = new URLSearchParams(window.location.search);
    const modelUrl = params.get("model");
    if (!modelUrl) throw new Error("model query parameter is required");

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);
    renderer.domElement.addEventListener("contextmenu", (event) => event.preventDefault());

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(28.0, window.innerWidth / window.innerHeight, 0.1, 50.0);
    camera.position.set(0.0, 0.7, -2.2);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.mouseButtons = {
      LEFT: THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.DOLLY,
      RIGHT: THREE.MOUSE.ROTATE,
    };

    const keyLight = new THREE.DirectionalLight(0xffffff, Math.PI * 0.9);
    keyLight.position.set(1.0, 1.0, 1.1).normalize();
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffefff, 1.0);
    fillLight.position.set(-1.0, 0.4, 1.0).normalize();
    scene.add(fillLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
    scene.add(ambientLight);

    const container = new THREE.Group();
    scene.add(container);

    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));
    loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

    const vrmaFiles = [
      "/GUI制御/vrma/VRMA_01.vrma",
      "/GUI制御/vrma/VRMA_02.vrma",
      "/GUI制御/vrma/VRMA_03.vrma",
      "/GUI制御/vrma/VRMA_04.vrma",
      "/GUI制御/vrma/VRMA_05.vrma",
      "/GUI制御/vrma/VRMA_06.vrma",
      "/GUI制御/vrma/VRMA_07.vrma",
    ];
    let mixer = null;
    let lastVrmaIndex = -1;
    let firstAnimation = true;

    function playRandomAnimation() {
      if (!currentVrm) return;
      let idx;
      if (firstAnimation) {
        idx = vrmaFiles.findIndex(f => f.includes("VRMA_07"));
        firstAnimation = false;
      } else {
        do { idx = Math.floor(Math.random() * vrmaFiles.length); } while (vrmaFiles.length > 1 && idx === lastVrmaIndex);
      }
      lastVrmaIndex = idx;
      loader.load(
        vrmaFiles[idx],
        (gltf) => {
          const vrmAnimation = gltf.userData.vrmAnimations?.[0];
          if (!vrmAnimation) return;
          if (mixer) mixer.stopAllAction();
          mixer = new THREE.AnimationMixer(currentVrm.scene);
          const clip = createVRMAnimationClip(vrmAnimation, currentVrm);
          const action = mixer.clipAction(clip);
          action.setLoop(THREE.LoopOnce, 1);
          action.clampWhenFinished = true;
          action.play();
          mixer.addEventListener("finished", () => playRandomAnimation());
        },
        undefined,
        (error) => console.error("VRMA load error:", error)
      );
    }

    const baseFacingRotationY = Math.PI;
    let currentVrm;
    let currentModelSize = null;
    let cameraZoom = 0.0;
    let cameraOffsetX = 0.0;
    let cameraOffsetY = 0.0;
    let cameraBaseDistance = 2.2;
    const DEFAULT_TARGET_HEIGHT_RATIO = 0.75;
    const DEFAULT_CAMERA_PHI = THREE.MathUtils.degToRad(88.0);
    const DEFAULT_CAMERA_DISTANCE_SCALE = 0.50;
    const clock = new THREE.Clock();
    const CAMERA_COMMAND_STEPS = {
      zoom_in: () => {
        const spherical = getCurrentOrbitSpherical();
        spherical.radius = Math.max(0.45, spherical.radius - 0.12);
        camera.position.copy(controls.target).add(new THREE.Vector3().setFromSpherical(spherical));
      },
      zoom_out: () => {
        const spherical = getCurrentOrbitSpherical();
        spherical.radius = Math.min(6.0, spherical.radius + 0.12);
        camera.position.copy(controls.target).add(new THREE.Vector3().setFromSpherical(spherical));
      },
      move_up: () => {
        controls.target.y += 0.06;
        camera.position.y += 0.06;
      },
      move_down: () => {
        controls.target.y -= 0.06;
        camera.position.y -= 0.06;
      },
      move_left: () => {
        controls.target.x -= 0.06;
        camera.position.x -= 0.06;
      },
      move_right: () => {
        controls.target.x += 0.06;
        camera.position.x += 0.06;
      },
    };

    function getCurrentOrbitSpherical() {
      const offset = camera.position.clone().sub(controls.target);
      const spherical = new THREE.Spherical();
      spherical.setFromVector3(offset);
      return spherical;
    }

    function applyCameraState({ preserveOrbit = true } = {}) {
      if (!currentModelSize) return;
      const targetY = currentModelSize.y * DEFAULT_TARGET_HEIGHT_RATIO + cameraOffsetY;
      let nextTarget;
      let spherical;
      if (preserveOrbit) {
        spherical = getCurrentOrbitSpherical();
        nextTarget = new THREE.Vector3(cameraOffsetX, targetY, 0.0);
        spherical.radius = Math.max(0.45, cameraBaseDistance - cameraZoom);
      } else {
        spherical = new THREE.Spherical(cameraBaseDistance, DEFAULT_CAMERA_PHI, Math.PI);
        nextTarget = new THREE.Vector3(cameraOffsetX, targetY, 0.0);
        spherical.radius = Math.max(0.45, cameraBaseDistance - cameraZoom);
      }
      controls.target.copy(nextTarget);
      camera.position.copy(nextTarget).add(new THREE.Vector3().setFromSpherical(spherical));
      controls.update();
      camera.updateProjectionMatrix();
    }

    function fitCameraToModel(size) {
      const padding = 1.02;
      const halfHeight = Math.max(0.1, size.y * 0.5);
      const halfWidth = Math.max(0.1, size.x * 0.5);
      const verticalFov = THREE.MathUtils.degToRad(camera.fov);
      const horizontalFov = 2.0 * Math.atan(Math.tan(verticalFov / 2.0) * camera.aspect);
      const distanceForHeight = halfHeight / Math.tan(verticalFov / 2.0);
      const distanceForWidth = halfWidth / Math.tan(horizontalFov / 2.0);
      cameraBaseDistance =
        (Math.max(distanceForHeight, distanceForWidth) * padding + Math.max(0.15, size.z * 0.45))
        * DEFAULT_CAMERA_DISTANCE_SCALE;
      applyCameraState({ preserveOrbit: false });
    }

    window.updateGuiView = ({ zoom = 0.0, offsetX = 0.0, offsetY = 0.0 } = {}) => {
      cameraZoom = Number.isFinite(zoom) ? zoom : 0.0;
      cameraOffsetX = Number.isFinite(offsetX) ? offsetX : 0.0;
      cameraOffsetY = Number.isFinite(offsetY) ? offsetY : 0.0;
      if (!currentModelSize) return;
      applyCameraState({ preserveOrbit: false });
    };

    let lipSyncTarget = 0.0;
    let lipSyncCurrent = 0.0;
    let lipSyncLastUpdateTime = 0;
    window.updateLipSync = (v) => {
      lipSyncTarget = Math.max(0.0, Math.min(1.0, v));
      lipSyncLastUpdateTime = performance.now();
    };

    window.applyGuiCommand = (command) => {
      const handler = CAMERA_COMMAND_STEPS[command];
      if (!handler) return;
      handler();
      controls.update();
      camera.updateProjectionMatrix();
    };

    loader.load(
      modelUrl,
      (gltf) => {
        const vrm = gltf.userData.vrm;
        VRMUtils.removeUnnecessaryVertices(gltf.scene);
        VRMUtils.removeUnnecessaryJoints(gltf.scene);
        vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

        const box = new THREE.Box3().setFromObject(vrm.scene);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        vrm.scene.position.x -= center.x;
        vrm.scene.position.y -= box.min.y;
        vrm.scene.position.z -= center.z;

        currentModelSize = size.clone();
        fitCameraToModel(currentModelSize);
        container.rotation.y = baseFacingRotationY;
        currentVrm = vrm;
        container.add(vrm.scene);
        playRandomAnimation();
      },
      undefined,
      (error) => console.error(error)
    );

    function updateExpressions(elapsed, deltaTime) {
      if (!currentVrm || !currentVrm.expressionManager) return;
      const blink = Math.sin(elapsed * 2.4) > 0.985 ? 1.0 : 0.0;
      currentVrm.expressionManager.setValue("blink", blink);
      const timeSinceUpdate = performance.now() - lipSyncLastUpdateTime;
      if (timeSinceUpdate > 80) {
        lipSyncTarget = Math.max(0.0, lipSyncTarget - deltaTime * 6.0);
      }
      lipSyncCurrent += (lipSyncTarget - lipSyncCurrent) * 0.6;
      currentVrm.expressionManager.setValue("aa", Math.min(1.0, lipSyncCurrent * 2.5));
    }

    function animate() {
      requestAnimationFrame(animate);
      const deltaTime = clock.getDelta();
      const elapsed = clock.elapsedTime;
      if (currentVrm) {
        if (mixer) mixer.update(deltaTime);
        currentVrm.update(deltaTime);
        updateExpressions(elapsed, deltaTime);
      }
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      if (currentModelSize) fitCameraToModel(currentModelSize);
      else camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
