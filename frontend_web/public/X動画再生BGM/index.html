<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X動画再生BGM - 自動交互再生</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">

    <!-- 2プレイヤー並列表示 -->
    <div class="players-container">
      <div id="player-a-wrap" class="player-box inactive" data-side="A">
        <div class="player-label">Player A</div>
        <div id="player-a" class="yt-player"></div>
      </div>
      <div id="player-b-wrap" class="player-box active" data-side="B">
        <div class="player-label">Player B</div>
        <div id="player-b" class="yt-player"></div>
      </div>
    </div>

    <!-- 情報パネル -->
    <section class="info-panel">
      <div class="info-left">
        <div class="app-kicker">YOUTUBE BGM</div>
        <div class="now-playing-row">
          <span id="player-indicator" class="player-badge player-b">Player B</span>
          <span id="current-title" class="current-title">読み込み中...</span>
        </div>
        <div class="status-row">
          <span id="status-text" class="status-text">準備中</span>
          <span class="sep">|</span>
          <span id="time-elapsed" class="time-val">0:00</span>
          <span class="time-slash">/</span>
          <span id="time-total" class="time-val">1:00</span>
          <span class="sep">|</span>
          <span id="time-remaining" class="time-remain">残 1:00</span>
          <span class="sep">|</span>
          <div class="vol-control">
            <span class="vol-label">VOL:</span>
            <select id="max-volume-select" class="vol-select">
              <option value="10">10%</option>
              <option value="20">20%</option>
              <option value="30">30%</option>
              <option value="40">40%</option>
              <option value="50" selected>50%</option>
              <option value="60">60%</option>
              <option value="70">70%</option>
              <option value="80">80%</option>
              <option value="90">90%</option>
              <option value="100">100%</option>
            </select>
          </div>
          <span class="sep">|</span>
          <div class="vol-control">
            <span class="vol-label">切替:</span>
            <select id="play-duration-select" class="vol-select">
              <option value="1" selected>1分</option>
              <option value="5">5分</option>
              <option value="10">10分</option>
              <option value="20">20分</option>
              <option value="30">30分</option>
            </select>
          </div>
        </div>
        <div class="progress-track">
          <div id="play-progress" class="progress-bar"></div>
        </div>
      </div>

      <div class="info-right">
        <div class="playlist-title">PLAYLIST</div>
        <div class="playlist-drum">
          <ol id="playlist-list" class="playlist-list"></ol>
        </div>
      </div>
    </section>

    <div id="user-play-toast" class="user-play-toast">▶ 再生を開始するには画面をクリックしてください</div>

  </main>

  <script src="playlist.js"></script>
  <script src="index.js"></script>
</body>
</html>
