      <div class="visual-meta">
        <div class="kicker">INTRODUCTION</div>

      <div class="image-shell">

            <div class="image-kicker">INTRODUCTION</div>
            <h2 class="image-title">この動画で紹介すること</h2>
            <div class="image-headline">
              <span class="headline-line">この動画では、AiDiy の全体像と</span>
              <span class="headline-line">設計の考え方を紹介します</span>
            </div>
            <p class="image-lead">日本語ファースト設計、3常駐サーバー + 1 CLI、業務サンプル、AI コア、MCP、knowledge の入口までを短く見ていきます。</p>
          </div>
        </div>
      </div>
