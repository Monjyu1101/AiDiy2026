<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiDiy 自己紹介 - アバター版</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(41, 216, 255, 0.16), transparent 26%),
        radial-gradient(circle at 85% 78%, rgba(196, 155, 255, 0.16), transparent 28%),
        linear-gradient(135deg, #040814 0%, #091425 46%, #0a1120 100%);
      color: #f5fbff;
      font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.18;
      pointer-events: none;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-rows: 58px 1fr 78px;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 24px;
      backdrop-filter: blur(16px);
      background: rgba(5,12,22,0.78);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .brand-wrap { display: flex; align-items: baseline; gap: 12px; }
    .brand { font-size: 20px; font-weight: 900; color: #8fe8ff; letter-spacing: 0.02em; }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(196,155,255,0.38);
      background: rgba(196,155,255,0.1);
      color: #c49bff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .top-note { color: #d7e4ee; font-size: 12px; line-height: 1.6; text-align: right; }

    /* ── STAGE ── */
    .stage {
      position: relative;
      display: grid;
      grid-template-columns: 38% 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    /* ── AVATAR PANEL (left) ── */
    .avatar-panel {
      position: relative;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #avatarCanvas {
      flex: 1;
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 600ms ease;
    }
    #avatarCanvas.ready { opacity: 1; }

    .avatar-subtitle {
      position: absolute;
      left: 14px; right: 14px; bottom: 14px;
      padding: 11px 16px;
      border-radius: 16px;
      background: rgba(4,10,18,0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f7fbff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
      pointer-events: none;
    }

    /* ── SCENE FRAME (right) ── */
    .scene-panel {
      position: relative;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(7,18,34,0.88);
      overflow: hidden;
    }

    .scene-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      backdrop-filter: blur(16px);
      background: rgba(5,12,22,0.78);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; }
    .controls-center { flex: 1; display: flex; justify-content: center; }

    .progress {
      width: min(420px, 100%);
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #29d8ff, #00e0b8, #c49bff);
      transition: width 120ms linear;
    }

    button {
      height: 38px;
      min-width: 38px;
      padding: 0 12px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 11px;
      background: rgba(255,255,255,0.05);
      color: #f5fbff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover {
      border-color: rgba(41,216,255,0.58);
      background: rgba(41,216,255,0.12);
    }
    .ghost-btn { color: #9eb2c6; font-weight: 700; }
    .meta, .timer { color: #d5e1eb; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .timer { font-variant-numeric: tabular-nums; }

    /* responsive */
    @media (max-width: 960px) {
      .stage { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
      .controls { flex-wrap: wrap; padding: 8px 14px; }
      .controls-center { order: 3; width: 100%; }
    }
    @media (max-width: 600px) {
      .topbar { flex-direction: column; align-items: flex-start; justify-content: center; gap: 4px; padding: 8px 14px; }
      .top-note { text-align: left; font-size: 11px; }
    }
  </style>
  <script src="scenario.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.179.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.2/lib/three-vrm.module.js"
      }
    }
  </script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand">AiDiy 自己紹介</div>
        <span class="brand-badge">AVATAR</span>
      </div>
      <div class="top-note">VRM アバターがプレゼンターとして AiDiy を紹介します。実装実態ベースの構成、生成画像と生成音声つき。</div>
    </header>

    <main class="stage">
      <!-- Left: Avatar Panel -->
      <section class="avatar-panel">
        <canvas id="avatarCanvas"></canvas>
        <div id="avatarSubtitle" class="avatar-subtitle"></div>
      </section>

      <!-- Right: Scene iframe -->
      <section class="scene-panel">
        <iframe id="sceneFrame" class="scene-frame" title="AiDiy 紹介シーン"></iframe>
      </section>
    </main>

    <footer class="controls">
      <div class="controls-left">
        <button id="prevBtn" type="button" aria-label="前へ">◁</button>
        <button id="playBtn" type="button" aria-label="再生">▶</button>
        <button id="nextBtn" type="button" aria-label="次へ">▷</button>
        <button id="restartBtn" type="button" class="ghost-btn">最初から</button>
      </div>
      <div class="controls-center">
        <div class="progress" aria-label="progress">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <div class="controls-right">
        <div id="timer" class="timer">00:00 / 01:30</div>
        <div id="meta" class="meta">scene 1 / 7</div>
      </div>
    </footer>
  </div>

  <!-- ===================== SCENARIO PLAYER ===================== -->
  <script>
    const scenario = window.SCENARIO;
    const sceneFrame = document.getElementById("sceneFrame");
    const avatarSubtitle = document.getElementById("avatarSubtitle");
    const timer = document.getElementById("timer");
    const meta = document.getElementById("meta");
    const progressFill = document.getElementById("progressFill");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");

    function getInitialSceneIndex() {
      const v = Number.parseInt(new URLSearchParams(window.location.search).get("scene") || "1", 10);
      if (!Number.isFinite(v)) return 0;
      return Math.min(Math.max(v - 1, 0), scenario.scenes.length - 1);
    }

    function formatTime(sec) {
      const s = Math.max(0, Math.round(sec));
      return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
    }

    let sceneIndex = getInitialSceneIndex();
    let playing = false;
    let sceneElapsedMs = 0;
    let sceneStartedAt = 0;
    let tickTimer = null;
    let sceneEndTimer = null;
    let playbackToken = 0;
    const audioPlayer = new Audio();
    window.audioPlayer = audioPlayer;
    audioPlayer.preload = "auto";

    function currentScene() { return scenario.scenes[sceneIndex]; }

    function clearTimers() {
      clearInterval(tickTimer); clearTimeout(sceneEndTimer);
      tickTimer = null; sceneEndTimer = null;
    }

    function currentTimelineSec() {
      return currentScene().start_sec + sceneElapsedMs / 1000;
    }

    function updateTimerAndProgress() {
      const total = scenario.duration_sec || 1;
      const current = currentTimelineSec();
      timer.textContent = formatTime(current) + " / " + formatTime(total);
      progressFill.style.width = Math.min(100, (current / total) * 100) + "%";
    }

    function armSceneEndTimer(remainingMs, token) {
      clearTimeout(sceneEndTimer);
      sceneEndTimer = setTimeout(() => {
        if (token !== playbackToken) return;
        nextScene(true);
      }, Math.max(0, Math.ceil(remainingMs)));
    }

    function renderScene() {
      const scene = currentScene();
      sceneFrame.src = scene.id + ".html";
      avatarSubtitle.textContent = scene.subtitle || scene.lead || "";
      meta.textContent = "scene " + (sceneIndex + 1) + " / " + scenario.scenes.length;
      updateTimerAndProgress();
      window.__avatarSetExpression?.(scene.expression || "neutral");
    }

    function beginPlayback() {
      const scene = currentScene();
      const token = ++playbackToken;
      clearTimers();
      sceneStartedAt = Date.now() - sceneElapsedMs;
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      tickTimer = setInterval(() => {
        if (Number.isFinite(audioPlayer.currentTime) && audioPlayer.currentTime > 0) {
          sceneElapsedMs = audioPlayer.currentTime * 1000;
        } else {
          sceneElapsedMs = Date.now() - sceneStartedAt;
        }
        updateTimerAndProgress();
      }, 100);

      const audioPath = typeof scene.audio === "string" && scene.audio ? scene.audio : "";
      if (!audioPath) {
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        window.__avatarOnAudioStop?.();
        armSceneEndTimer(scene.duration_sec * 1000 - sceneElapsedMs + 200, token);
        return;
      }
      const handlePlaying = () => {
        if (token !== playbackToken) return;
        const currentMs = Number.isFinite(audioPlayer.currentTime) && audioPlayer.currentTime > 0
          ? audioPlayer.currentTime * 1000 : sceneElapsedMs;
        armSceneEndTimer(scene.duration_sec * 1000 - currentMs + 1200, token);
      };
      audioPlayer.addEventListener("playing", handlePlaying, { once: true });
      audioPlayer.src = audioPath + "?v=" + encodeURIComponent(scene.duration_sec);
      audioPlayer.currentTime = Math.min(sceneElapsedMs / 1000, Math.max(0, scene.duration_sec - 0.05));
      audioPlayer.play().then(() => {
        handlePlaying();
      }).catch(() => {
        sceneStartedAt = Date.now() - sceneElapsedMs;
        armSceneEndTimer(scene.duration_sec * 1000 - sceneElapsedMs + 1200, token);
      });
    }

    function play() {
      if (playing) return;
      if (sceneElapsedMs >= currentScene().duration_sec * 1000 - 80) sceneElapsedMs = 0;
      playing = true;
      playBtn.textContent = "⏸";
      window.__avatarResumeAudioContext?.();
      beginPlayback();
    }

    function pause() {
      if (!playing) return;
      playing = false;
      playBtn.textContent = "▶";
      sceneElapsedMs = Math.min(
        Number.isFinite(audioPlayer.currentTime) && audioPlayer.currentTime > 0
          ? audioPlayer.currentTime * 1000
          : Math.max(0, Date.now() - sceneStartedAt),
        currentScene().duration_sec * 1000
      );
      audioPlayer.pause();
      window.__avatarOnAudioStop?.();
      clearTimers();
      updateTimerAndProgress();
    }

    function moveToScene(index) {
      sceneIndex = Math.min(Math.max(index, 0), scenario.scenes.length - 1);
      sceneElapsedMs = 0;
      renderScene();
      if (playing) beginPlayback();
    }

    function nextScene() {
      if (sceneIndex < scenario.scenes.length - 1) {
        moveToScene(sceneIndex + 1);
      } else {
        clearTimers();
        sceneElapsedMs = currentScene().duration_sec * 1000;
        audioPlayer.pause();
        window.__avatarOnAudioStop?.();
        updateTimerAndProgress();
        progressFill.style.width = "100%";
        playing = false;
        playBtn.textContent = "▶";
      }
    }

    function prevScene() { moveToScene(sceneIndex - 1); }

    prevBtn.addEventListener("click", () => { pause(); prevScene(); });
    nextBtn.addEventListener("click", () => { pause(); nextScene(); });
    playBtn.addEventListener("click", () => { if (playing) pause(); else play(); });
    restartBtn.addEventListener("click", () => { pause(); moveToScene(0); });

    window.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); if (playing) pause(); else play(); }
      if (e.key === "ArrowRight") { e.preventDefault(); pause(); nextScene(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); pause(); prevScene(); }
    });

    audioPlayer.addEventListener("ended", () => {
      window.__avatarOnAudioStop?.();
      if (!playing) return;
      clearTimers();
      nextScene();
    });
    audioPlayer.addEventListener("error", () => {
      window.__avatarOnAudioStop?.();
      console.warn("audio load failed", audioPlayer.src);
    });
    audioPlayer.addEventListener("play", () => { window.__avatarOnAudioStart?.(); });
    audioPlayer.addEventListener("pause", () => { window.__avatarOnAudioStop?.(); });

    renderScene();
    if (new URLSearchParams(window.location.search).get("autoplay") === "1") {
      setTimeout(() => play(), 400);
    }
  </script>

  <!-- ===================== VRM AVATAR ===================== -->
  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";

    const canvas = document.getElementById("avatarCanvas");
    const pane = canvas.parentElement;

    const getSize = () => ({
      width: Math.max(1, pane.clientWidth || 320),
      height: Math.max(1, pane.clientHeight || 480)
    });

    let { width, height } = getSize();
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setClearColor(0x000000, 0);
    renderer.setSize(width, height, false);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(26, width / height, 0.01, 40);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(1.1, 1.5, 1.0);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xd8ecff, 0.85);
    rimLight.position.set(-1.3, 0.8, 1.1);
    scene.add(rimLight);

    const container = new THREE.Group();
    const BODY_BASE_YAW = Math.PI - Math.PI / 8;
    const BODY_SWAY_RANGE = Math.PI / 52;
    const CAMERA_BASE_X = -0.04;
    const CAMERA_SWAY_X = 0.03;
    const HEAD_BASE_YAW = Math.PI / 14;
    container.rotation.y = BODY_BASE_YAW;
    scene.add(container);

    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    function loadWith(gltfLoader, url) {
      return new Promise((resolve, reject) => {
        gltfLoader.load(url, resolve, undefined, reject);
      });
    }

    const IDLE_BONE_ROT = {
      leftUpperArm: { z: -1.25 },
      rightUpperArm: { z: 1.25 },
      leftLowerArm: { y: 0.1 },
      rightLowerArm: { y: -0.1 },
      leftShoulder: { z: -0.05 },
      rightShoulder: { z: 0.05 }
    };

    function applyIdlePose(vrmObject) {
      const humanoid = vrmObject?.humanoid;
      if (!humanoid) return;
      Object.entries(IDLE_BONE_ROT).forEach(([name, rot]) => {
        const node = humanoid.getNormalizedBoneNode?.(name);
        if (!node) return;
        node.rotation.set(rot.x || 0, rot.y || 0, rot.z || 0);
      });
    }

    function updateIdleSway(vrmObject, elapsed) {
      const humanoid = vrmObject?.humanoid;
      if (!humanoid) return;
      const chest = humanoid.getNormalizedBoneNode?.("chest");
      const head = humanoid.getNormalizedBoneNode?.("head");
      if (chest) chest.rotation.x = Math.sin(elapsed * 1.4) * 0.02;
      if (head) {
        const lookAtSway = camera.position.x * 0.6;
        head.rotation.y = HEAD_BASE_YAW + lookAtSway + Math.sin(elapsed * 0.7) * 0.02;
        head.rotation.x = Math.sin(elapsed * 1.0 + 1.2) * 0.03;
      }
    }

    const EXPRESSION_KEYS = ["happy", "angry", "sad", "relaxed", "surprised", "neutral"];
    let currentExpression = "neutral";
    let targetExpression = "neutral";
    let expressionValue = 0;
    let blinkTimer = 0;
    let blinkCooldown = 2 + Math.random() * 3;
    const BLINK_DURATION = 0.15;
    let vrm = null;
    let avatarHeadHeight = 1.4;

    window.__avatarSetExpression = (name) => {
      targetExpression = EXPRESSION_KEYS.includes(name) ? name : "neutral";
    };

    let audioCtx = null;
    let analyser = null;
    let analyserData = null;
    let lipsyncActive = false;
    let mouthSmooth = 0;
    const MOUTH_LEVEL_GAIN = 1.45;

    const ensureAudioGraph = () => {
      if (audioCtx) return;
      const player = window.audioPlayer;
      if (!player) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const source = ctx.createMediaElementSource(player);
        const an = ctx.createAnalyser();
        an.fftSize = 256;
        an.smoothingTimeConstant = 0.5;
        source.connect(an);
        an.connect(ctx.destination);
        audioCtx = ctx;
        analyser = an;
        analyserData = new Uint8Array(an.frequencyBinCount);
      } catch (e) {
        console.warn("lipsync setup failed", e);
      }
    };

    const computeMouthLevel = (data) => {
      if (!data || data.length === 0) return 0;
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      return Math.min(1, (sum / data.length / 128) * MOUTH_LEVEL_GAIN);
    };

    window.__avatarResumeAudioContext = () => {
      ensureAudioGraph();
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
    };
    window.__avatarOnAudioStart = () => {
      lipsyncActive = true;
      window.__avatarResumeAudioContext?.();
    };
    window.__avatarOnAudioStop = () => {
      lipsyncActive = false;
      mouthSmooth = 0;
      try { vrm?.expressionManager?.setValue("aa", 0); } catch {}
    };

    const getMouthTarget = () => {
      const player = window.audioPlayer;
      if (!lipsyncActive || !player || player.paused || !analyser || !analyserData) return 0;
      analyser.getByteFrequencyData(analyserData);
      return computeMouthLevel(analyserData);
    };

    try {
      const gltf = await loadWith(loader, "../AiDiy_Sample_M.vrm");
      vrm = gltf.userData?.vrm || null;
      if (vrm) {
        try { VRMUtils.removeUnnecessaryVertices(gltf.scene); } catch {}
        try { VRMUtils.removeUnnecessaryJoints(gltf.scene); } catch {}
        vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

        const box = new THREE.Box3().setFromObject(vrm.scene);
        const center = box.getCenter(new THREE.Vector3());
        const sizeVec = box.getSize(new THREE.Vector3());
        vrm.scene.position.x -= center.x;
        vrm.scene.position.y -= box.min.y;
        vrm.scene.position.z -= center.z;
        container.add(vrm.scene);

        avatarHeadHeight = Math.max(0.1, sizeVec.y) * 0.88;
        camera.position.set(CAMERA_BASE_X, Math.max(0.1, sizeVec.y) * 0.88, -Math.max(0.1, sizeVec.y) * 1.1);
        camera.lookAt(0, avatarHeadHeight, 0);

        vrm.lookAt.target = camera;
        applyIdlePose(vrm);
        vrm.update(0);
        renderer.render(scene, camera);
      }
    } catch (err) {
      console.error("Avatar load error:", err);
    } finally {
      canvas.classList.add("ready");
    }

    function updateExpression(dt) {
      if (!vrm?.expressionManager) return;
      const lerpRate = 1 - Math.pow(0.001, dt);
      if (currentExpression !== targetExpression) {
        expressionValue = Math.max(0, expressionValue - dt * 4);
        if (expressionValue <= 0.01) {
          try { vrm.expressionManager.setValue(currentExpression, 0); } catch {}
          currentExpression = targetExpression;
        }
      } else {
        const goal = currentExpression === "neutral" ? 0 : 0.6;
        expressionValue += (goal - expressionValue) * lerpRate;
      }
      EXPRESSION_KEYS.forEach((key) => {
        if (key === "neutral") return;
        try { vrm.expressionManager.setValue(key, key === currentExpression ? expressionValue : 0); } catch {}
      });
    }

    function updateBlink(dt) {
      if (!vrm?.expressionManager) return;
      blinkTimer += dt;
      if (blinkTimer < blinkCooldown) {
        vrm.expressionManager.setValue("blink", 0);
      } else if (blinkTimer < blinkCooldown + BLINK_DURATION) {
        const progress = (blinkTimer - blinkCooldown) / BLINK_DURATION;
        vrm.expressionManager.setValue("blink", Math.sin(progress * Math.PI));
      } else {
        vrm.expressionManager.setValue("blink", 0);
        blinkTimer = 0;
        blinkCooldown = 2 + Math.random() * 3;
      }
    }

    const clock = new THREE.Clock();

    function resizeRenderer() {
      const s = getSize();
      renderer.setSize(s.width, s.height, false);
      camera.aspect = s.width / s.height;
      camera.updateProjectionMatrix();
    }

    window.addEventListener("resize", resizeRenderer, { passive: true });

    function tick() {
      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;
      updateBlink(dt);
      updateExpression(dt);

      camera.position.x = CAMERA_BASE_X + Math.sin(elapsed * 0.45) * CAMERA_SWAY_X;
      camera.lookAt(0, avatarHeadHeight, 0);

      if (vrm) {
        container.rotation.y = BODY_BASE_YAW + Math.sin(elapsed * 0.35) * BODY_SWAY_RANGE;
        if (vrm.expressionManager) {
          ensureAudioGraph();
          const target = getMouthTarget();
          mouthSmooth += (target - mouthSmooth) * (target > mouthSmooth ? 0.82 : 0.48);
          try { vrm.expressionManager.setValue("aa", mouthSmooth); } catch {}
        }
        updateIdleSway(vrm, elapsed);
        vrm.update(dt);
      }
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    window.__avatarSetExpression?.("neutral");
    resizeRenderer();
    requestAnimationFrame(tick);
  </script>
