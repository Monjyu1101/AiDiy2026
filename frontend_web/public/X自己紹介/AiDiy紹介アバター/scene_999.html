<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ご視聴ありがとうございました</title>
  <link rel="stylesheet" href="scene.css">
</head>
<body>
  <div id="stage" class="stage stage-hero stage-hero-focus fade-enter" style="--accent:#c49bff;--accent-soft:rgba(196,155,255,0.2);">
    <section class="visual-panel">
      <div class="visual-meta">
        <div class="kicker">THANK YOU</div>
        <div class="scene-id">scene_999 / 7 of 7</div>
      </div>
      <div class="image-shell">
        <img class="scene-image" src="images/hero.png" alt="AiDiy"
          onload="this.classList.add('loaded')">
        <div class="image-placeholder">画像を読み込み中...</div>
        <div class="image-overlay">
          <div class="image-overlay-copy">
            <div class="image-kicker">THANK YOU</div>
            <h2 class="image-title">ご視聴ありがとうございました</h2>
            <div class="image-headline">
              <span class="headline-line">ご視聴ありがとうございました。</span>
              <span class="headline-line">あなたなら AiDiy でなにを創りますか？</span>
            </div>
            <p class="image-lead">Web UI、Avatar、Backend、MCP、Hermes まで、AiDiy には一緒に試しながら形にできる部品がそろっています。</p>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
