<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiDiy 自己紹介 - document_to_html 試作</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 18%, rgba(0, 210, 255, 0.18), transparent 28%),
        radial-gradient(circle at 82% 74%, rgba(255, 0, 180, 0.14), transparent 30%),
        linear-gradient(135deg, #08111f 0%, #101929 44%, #0b1020 100%);
      color: #eff8ff;
      font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr 132px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
      border-bottom: 1px solid rgba(160, 220, 255, 0.22);
      background: rgba(4, 10, 18, 0.72);
      backdrop-filter: blur(14px);
    }

    .brand {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      color: #9fe8ff;
    }

    .meta {
      color: #a7b8c8;
      font-size: 13px;
      white-space: nowrap;
    }

    .progress {
      height: 6px;
      width: 240px;
      background: rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #29d8ff, #ff4ad8, #ffe35c);
      transition: width 320ms ease;
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 38vw);
      gap: 28px;
      padding: 34px;
      min-height: 0;
    }

    .visual {
      position: relative;
      min-width: 0;
      border: 1px solid rgba(139, 225, 255, 0.25);
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        rgba(4, 12, 24, 0.72);
      background-size: 34px 34px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    .visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(0, 255, 255, 0.18), transparent 28%),
        radial-gradient(circle at 78% 70%, rgba(255, 0, 200, 0.14), transparent 30%);
      pointer-events: none;
    }

    .visual-inner {
      position: relative;
      height: 100%;
      padding: 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
    }

    .scene-kicker {
      color: #77dfff;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .scene-main {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 0;
    }

    .screen-text {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      justify-content: center;
      max-width: 900px;
      font-weight: 900;
      color: #f6fbff;
      text-shadow: 0 0 26px rgba(41, 216, 255, 0.32);
    }

    .screen-text .line-primary {
      font-size: 56px;
      line-height: 1.08;
    }

    .screen-text .line-secondary {
      font-size: 28px;
      line-height: 1.3;
      color: #c5d7e8;
    }

    .diagram {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 30px;
    }

    .node {
      min-width: 120px;
      padding: 12px 16px;
      border: 1px solid rgba(155, 236, 255, 0.4);
      border-radius: 8px;
      background: rgba(8, 24, 42, 0.86);
      color: #bff4ff;
      font-size: 14px;
      font-weight: 700;
    }

    .side {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(5, 12, 22, 0.76);
      padding: 26px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .scene-title {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.22;
      margin: 0 0 14px;
      color: #ffffff;
    }

    .source-hint {
      color: #8ea8ba;
      font-size: 13px;
      line-height: 1.7;
      border-left: 3px solid #29d8ff;
      padding-left: 12px;
      margin-bottom: 18px;
    }

    .narration-label {
      color: #ffe35c;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .narration {
      color: #dbe9f4;
      font-size: 18px;
      line-height: 1.9;
      margin: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto auto auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 20px 28px;
      background: rgba(4, 10, 18, 0.84);
      border-top: 1px solid rgba(160, 220, 255, 0.22);
    }

    button {
      height: 40px;
      padding: 0 16px;
      border: 1px solid rgba(158, 232, 255, 0.38);
      background: rgba(12, 32, 52, 0.88);
      color: #eff8ff;
      border-radius: 6px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      border-color: #29d8ff;
      background: rgba(18, 54, 82, 0.94);
    }

    .subtitle {
      min-width: 0;
      padding: 12px 18px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      font-size: 20px;
      line-height: 1.55;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .timer {
      color: #a8bac9;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      min-width: 88px;
      text-align: right;
    }

    .fade-enter {
      animation: fadeIn 420ms ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 960px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        min-height: 0;
        grid-template-rows: 56px minmax(0, 1fr) auto;
      }

      .stage {
        grid-template-columns: 1fr;
        padding: 18px;
        gap: 18px;
        min-height: 0;
        overflow-y: auto;
      }

      .visual {
        min-height: 176px;
      }

      .visual-inner {
        padding: 26px;
        gap: 18px;
      }

      .screen-text .line-primary {
        font-size: 38px;
      }

      .screen-text .line-secondary {
        font-size: 22px;
      }

      .diagram {
        margin-top: 18px;
      }

      .side {
        padding: 24px;
      }

      .scene-title {
        font-size: 28px;
      }

      .source-hint {
        font-size: 12px;
        line-height: 1.55;
        margin-bottom: 14px;
      }

      .narration {
        font-size: 16px;
        line-height: 1.65;
      }

      .controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        padding: 18px 28px 20px;
      }

      .subtitle {
        grid-column: 1 / -1;
      }

      .timer {
        grid-column: 1 / -1;
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">AiDiy 自己紹介</div>
      <div class="progress" aria-label="progress"><div id="progressFill" class="progress-fill"></div></div>
      <div id="meta" class="meta">scene 1 / 10</div>
    </header>

    <main class="stage">
      <section class="visual">
        <div class="visual-inner">
          <div id="sceneKicker" class="scene-kicker"></div>
          <div class="scene-main">
            <div>
              <div id="screenText" class="screen-text"></div>
              <div id="diagram" class="diagram"></div>
            </div>
          </div>
          <div id="visualType" class="scene-kicker"></div>
        </div>
      </section>

      <aside class="side">
        <h1 id="sceneTitle" class="scene-title"></h1>
        <div id="sourceHint" class="source-hint"></div>
        <div class="narration-label">Narration</div>
        <p id="narration" class="narration"></p>
      </aside>
    </main>

    <footer class="controls">
      <button id="prevBtn" type="button" onclick="prevScene()">前へ</button>
      <button id="playBtn" type="button" onclick="play()">再生</button>
      <button id="pauseBtn" type="button" onclick="pause()">停止</button>
      <button id="nextBtn" type="button" onclick="nextScene(false)">次へ</button>
      <div id="subtitle" class="subtitle"></div>
      <div id="timer" class="timer">00:00 / 01:40</div>
    </footer>
  </div>

  <script>
    const scenario = {
      "project_name": "AiDiy自己紹介",
      "title": "AiDiy - 日本語で設計し、音声でもコードでも動かす",
      "source": {
            "type": "html",
            "path": "frontend_web/public/X自己紹介/index.html",
            "summary": "AiDiy の日本語ファースト設計、FastAPI/Vue/Avatar/MCP/Code CLI/自己改善機構を紹介する静的ページ"
      },
      "target": {
            "language": "ja-JP",
            "duration_sec": 100,
            "format": "document_to_html",
            "tone": "落ち着いた技術紹介。業務システム開発者、AIエージェント活用者向け。",
            "goal": "AiDiy が日本語ファーストのフルスタック業務システム開発テンプレートであり、AI・音声・アバター・MCP・Code CLI を統合した実験基盤でもあることを伝える。"
      },
      "assets_policy": {
            "image_output_dir": "backend_server/temp/output/AiDiy自己紹介/images",
            "audio_output_dir": "backend_server/temp/output/AiDiy自己紹介/audio",
            "html_output_path": "backend_server/temp/output/AiDiy自己紹介/index.html",
            "image_style": "実在UIのスクリーンショット風と、抽象的な技術イメージを混ぜる。過度な装飾より、システム構成が見える図解を優先。",
            "narration_voice": "ja-JP-NanamiNeural",
            "audio_timing": "generated_mp3_duration",
            "pronunciation_dictionary": "backend_server/_config/aidiy_text_to_speech.json"
      },
      "scenes": [
            {
                  "id": "scene_001",
                  "title": "オープニング",
                  "start_sec": 0.0,
                  "duration_sec": 7.1,
                  "visual_type": "title",
                  "source_hint": "Hero: AiDiy / 日本語で設計し、音声でもコードでも動かす。",
                  "screen_text": "AiDiy\n日本語で設計し、音声でもコードでも動かす",
                  "narration": "AiDiy は、日本語を第一言語にしたフルスタック業務システム開発フレームワークです。",
                  "subtitle": "AiDiy は、日本語を第一言語にしたフルスタック業務システム開発フレームワークです。",
                  "image_prompt": "Dark futuristic Japanese software platform title screen, glowing text AiDiy, cyan and magenta accents, clean enterprise system mood, 16:9"
            },
            {
                  "id": "scene_002",
                  "title": "日本語ファースト",
                  "start_sec": 7.1,
                  "duration_sec": 14.45,
                  "visual_type": "diagram",
                  "source_hint": "日本語ファースト: DB、API、JSON、画面、Vueコンポーネントまで日本語で統一。",
                  "screen_text": "DB / API / UI / Code\n業務語彙と実装名を揃える",
                  "narration": "特徴の中心は、日本語ファースト設計です。テーブル名、API、JSON キー、画面名、コード上の変数名まで、業務語彙と実装を直接対応させます。",
                  "subtitle": "日本語ファースト設計で、業務語彙と実装を直接対応させます。",
                  "image_prompt": "Clean technical diagram showing Japanese database, API JSON, frontend UI, and code variables connected by arrows, enterprise dashboard style, 16:9"
            },
            {
                  "id": "scene_003",
                  "title": "マルチサーバー構成",
                  "start_sec": 21.55,
                  "duration_sec": 16.22,
                  "visual_type": "architecture",
                  "source_hint": "backend_server core/apps、backend_mcp、frontend_web、frontend_avatar。",
                  "screen_text": "backend_server / backend_mcp / frontend_web / frontend_avatar",
                  "narration": "構成は、Core API、Apps API、MCP サーバー、Web UI、Avatar UI に分かれています。分かれていても、Vite proxy と WebSocket で、ひとつの体験としてつながります。",
                  "subtitle": "Core、Apps、MCP、Web、Avatar が連携し、ひとつの体験を作ります。",
                  "image_prompt": "System architecture diagram with FastAPI servers, MCP hub, Vue web UI, Electron avatar UI, arrows and ports, dark theme, Japanese labels, 16:9"
            },
            {
                  "id": "scene_004",
                  "title": "実務サンプル",
                  "start_sec": 37.77,
                  "duration_sec": 15.07,
                  "visual_type": "business_samples",
                  "source_hint": "配車管理、生産管理、資材在庫管理。",
                  "screen_text": "配車管理 / 生産管理 / 資材在庫管理",
                  "narration": "テンプレートの核は、実際に動く業務サンプルです。配車、生産、資材在庫管理を通じて、マスタ、トランザクション、ビュー、スケジューラの実装パターンを確認できます。",
                  "subtitle": "配車、生産、在庫管理で、業務システムの実装パターンを確認できます。",
                  "image_prompt": "Three enterprise application panels: dispatch scheduling, production management, inventory tracking, Japanese UI labels, clean practical business software, 16:9"
            },
            {
                  "id": "scene_005",
                  "title": "AI + 音声 + アバター",
                  "start_sec": 52.84,
                  "duration_sec": 15.24,
                  "visual_type": "avatar_flow",
                  "source_hint": "Gemini Live / OpenAI Realtime、VRM / VRMA、音声入出力、口パク同期。",
                  "screen_text": "Chat / Voice / Image / Avatar",
                  "narration": "AiDiy は、チャットだけではありません。音声入力、AI 音声応答、画像、VRM アバター、VRMA モーションを組み合わせて、対話型の AI 体験を作ります。",
                  "subtitle": "音声、画像、VRM アバターを組み合わせ、対話型の AI 体験を作ります。",
                  "image_prompt": "Japanese AI avatar interface, VRM character speaking beside chat and voice waveform panels, modern desktop application, 16:9"
            },
            {
                  "id": "scene_006",
                  "title": "MCP Hub",
                  "start_sec": 68.08,
                  "duration_sec": 22.97,
                  "visual_type": "mcp_hub",
                  "source_hint": "13 MCP: chrome_devtools, desktop_capture, sqlite, postgres, logs, code_check, backup_check, backup_save, image_generation, speech_to_text, text_to_speech, obs_studio_control, ffmpeg_control。",
                  "screen_text": "MCP Hub × 13\nobserve / generate / verify",
                  "narration": "ポート 8095 には、13 個の MCP サーバーが同居します。ブラウザ操作、画面キャプチャ、DB 観測、ログ確認、型チェック、バックアップ、画像生成、音声認識、音声合成、画面録画、動画変換を、AI エージェントから利用できます。",
                  "subtitle": "13 個の MCP が、観測、生成、検証を AI エージェントに提供します。",
                  "image_prompt": "Hub-and-spoke diagram of 13 MCP tools around an AI agent, browser, database, logs, backup, image, speech, video icons, dark technical style, 16:9"
            },
            {
                  "id": "scene_007",
                  "title": "Code CLI と Hermes",
                  "start_sec": 91.05,
                  "duration_sec": 16.78,
                  "visual_type": "code_agents",
                  "source_hint": "claude_sdk, claude_cli, copilot_cli, codex_cli, gemini_cli, opencode_cli, aidiy_hermes。",
                  "screen_text": "Multi Code CLI\nClaude / Copilot / Codex / Gemini / OpenCode / Hermes",
                  "narration": "コード支援は、複数の Code CLI を並走できます。Claude、Copilot、Codex、Gemini、OpenCode、そして AiDiy 独自の aidiy_hermes を、用途ごとに切り替えられます。",
                  "subtitle": "複数の Code CLI を並走し、用途ごとに切り替えられます。",
                  "image_prompt": "Multiple code agent terminals side by side, labels Claude Copilot Codex Gemini OpenCode Hermes, Japanese development workspace, 16:9"
            },
            {
                  "id": "scene_008",
                  "title": "自己改善機構",
                  "start_sec": 107.83,
                  "duration_sec": 13.63,
                  "visual_type": "loop",
                  "source_hint": ".aidiy/knowledge、edit → observe → verify → backup、使うほど育つ。",
                  "screen_text": "edit → observe → verify → backup\n.aidiy/knowledge",
                  "narration": "修正して終わりではありません。AiDiy は、変更、観測、検証、バックアップの流れを記録し、.aidiy/knowledge に再利用できる知見を積み上げます。",
                  "subtitle": "変更、観測、検証、バックアップを通じて、再利用できる知見を積み上げます。",
                  "image_prompt": "Self improvement loop diagram for software agents: edit observe verify backup knowledge, glowing cycle arrows, Japanese labels, 16:9"
            },
            {
                  "id": "scene_009",
                  "title": "広がるテンプレート",
                  "start_sec": 121.46,
                  "duration_sec": 13.46,
                  "visual_type": "roadmap",
                  "source_hint": "MCP 拡張、CLI エコシステム、業務領域の横展開、多言語対応。",
                  "screen_text": "MCP拡張 / CLI追加 / 業務領域の横展開",
                  "narration": "今後は、MCP の追加、Code CLI の追加、業務領域の横展開によって、会計、HR、CRM などにも同じ設計を広げられます。",
                  "subtitle": "MCP、CLI、業務テンプレートを追加し、より多くの領域へ広げられます。",
                  "image_prompt": "Roadmap branching from Japanese enterprise template to accounting HR CRM and AI tools, clean technology roadmap, 16:9"
            },
            {
                  "id": "scene_010",
                  "title": "クロージング",
                  "start_sec": 134.92,
                  "duration_sec": 11.35,
                  "visual_type": "launch",
                  "source_hint": "Launch: AiDiy を開く。frontend_web、/AiDiy、frontend_avatar。",
                  "screen_text": "AiDiy\n日本語で、業務とAIをつなぐ。",
                  "narration": "AiDiy は、日本語で業務と AI をつなぐための実験基盤です。まずは Web UI、AI コア、Avatar から触ってみてください。",
                  "subtitle": "AiDiy は、日本語で業務と AI をつなぐための実験基盤です。",
                  "image_prompt": "Final launch screen for AiDiy, Japanese enterprise AI platform, web UI and avatar UI glowing softly, call to action, 16:9"
            }
      ],
      "next_steps": [
            "scenario.json の粒度を確認する",
            "必要ならシーン数とナレーション量を調整する",
            "画像生成 MCP で images/ を作る",
            "TTS MCP で audio/ を作る",
            "音声付き index.html の試作へ進む"
      ],
      "duration_sec": 146.27
};

    const sceneTitle = document.getElementById("sceneTitle");
    const sceneKicker = document.getElementById("sceneKicker");
    const screenText = document.getElementById("screenText");
    const sourceHint = document.getElementById("sourceHint");
    const narration = document.getElementById("narration");
    const subtitle = document.getElementById("subtitle");
    const visualType = document.getElementById("visualType");
    const meta = document.getElementById("meta");
    const timer = document.getElementById("timer");
    const progressFill = document.getElementById("progressFill");
    const diagram = document.getElementById("diagram");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function initialSceneIndex() {
      const sceneParam = new URLSearchParams(window.location.search).get("scene");
      const requested = Number.parseInt(sceneParam || "1", 10);
      if (!Number.isFinite(requested)) return 0;
      return Math.min(Math.max(requested - 1, 0), scenario.scenes.length - 1);
    }

    let sceneIndex = initialSceneIndex();
    let playing = false;
    let timerId = null;
    let advanceTimerId = null;
    let sceneStartedAt = 0;
    const audioPlayer = new Audio();
    audioPlayer.preload = "auto";

    function formatTime(sec) {
      const s = Math.max(0, Math.round(sec));
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function currentScene() {
      return scenario.scenes[sceneIndex];
    }

    function renderDiagram(scene) {
      diagram.innerHTML = "";
      const nodeMap = {
        title: ["AiDiy", "日本語", "AI"],
        diagram: ["Database", "API", "Frontend", "Code"],
        architecture: ["Core API", "Apps API", "MCP", "Web", "Avatar"],
        business_samples: ["配車", "生産", "在庫"],
        avatar_flow: ["Chat", "Voice", "Image", "Avatar"],
        mcp_hub: ["browser", "capture", "db", "logs", "image", "tts"],
        code_agents: ["Claude", "Copilot", "Codex", "Gemini", "Hermes"],
        loop: ["edit", "observe", "verify", "backup", "knowledge"],
        roadmap: ["MCP", "CLI", "業務", "多言語"],
        launch: ["Web UI", "AI Core", "Avatar"]
      };
      for (const label of nodeMap[scene.visual_type] || []) {
        const node = document.createElement("div");
        node.className = "node";
        node.textContent = label;
        diagram.appendChild(node);
      }
    }

    function renderScene() {
      const scene = currentScene();
      sceneTitle.textContent = scene.title;
      sceneKicker.textContent = `${scene.id} / ${scenario.title}`;
      visualType.textContent = scene.visual_type;
      sourceHint.textContent = scene.source_hint;
      narration.textContent = scene.narration;
      subtitle.textContent = scene.subtitle;
      meta.textContent = `scene ${sceneIndex + 1} / ${scenario.scenes.length}`;
      progressFill.style.width = `${(sceneIndex / Math.max(1, scenario.scenes.length - 1)) * 100}%`;
      timer.textContent = `${formatTime(scene.start_sec)} / ${formatTime(scenario.duration_sec)}`;

      screenText.innerHTML = "";
      const lines = String(scene.screen_text || "").split("\n");
      lines.forEach((line, idx) => {
        const div = document.createElement("div");
        div.className = idx === 0 ? "line-primary" : "line-secondary";
        div.textContent = line;
        screenText.appendChild(div);
      });
      renderDiagram(scene);

      document.querySelector(".visual-inner").classList.remove("fade-enter");
      void document.querySelector(".visual-inner").offsetWidth;
      document.querySelector(".visual-inner").classList.add("fade-enter");
    }

    function audioPath(scene) {
      return `audio/${scene.id}.mp3`;
    }

    function stopAudio() {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
    }

    function clearPlaybackTimers() {
      clearInterval(timerId);
      clearTimeout(advanceTimerId);
      timerId = null;
      advanceTimerId = null;
    }

    function advanceFromScene(expectedSceneIndex) {
      if (!playing || sceneIndex !== expectedSceneIndex) return;
      nextScene(true);
    }

    function playSceneAudio(scene) {
      audioPlayer.src = `${audioPath(scene)}?v=mp3-dict1`;
      audioPlayer.currentTime = 0;
      audioPlayer.play().catch((error) => {
        console.error("audio playback failed", error);
        pause();
      });
    }

    function startScenePlayback() {
      const scene = currentScene();
      const expectedSceneIndex = sceneIndex;
      sceneStartedAt = Date.now();
      clearPlaybackTimers();
      timerId = setInterval(() => {
        const elapsed = Number.isFinite(audioPlayer.currentTime) && audioPlayer.currentTime > 0
          ? audioPlayer.currentTime
          : (Date.now() - sceneStartedAt) / 1000;
        timer.textContent = `${formatTime(scene.start_sec + elapsed)} / ${formatTime(scenario.duration_sec)}`;
      }, 250);
      advanceTimerId = setTimeout(() => {
        advanceFromScene(expectedSceneIndex);
      }, Math.ceil((scene.duration_sec + 0.8) * 1000));
      playSceneAudio(scene);
    }

    function play() {
      playing = true;
      playBtn.textContent = "再生中";
      startScenePlayback();
    }

    function pause() {
      playing = false;
      playBtn.textContent = "再生";
      clearPlaybackTimers();
      stopAudio();
    }

    function nextScene(fromAuto = false) {
      clearPlaybackTimers();
      if (!fromAuto) stopAudio();
      if (sceneIndex < scenario.scenes.length - 1) {
        sceneIndex += 1;
        renderScene();
        if (playing) startScenePlayback();
      } else {
        pause();
        progressFill.style.width = "100%";
      }
    }

    function prevScene() {
      pause();
      sceneIndex = Math.max(0, sceneIndex - 1);
      renderScene();
    }

    audioPlayer.addEventListener("ended", () => {
      clearTimeout(advanceTimerId);
      advanceTimerId = null;
      if (playing) nextScene(true);
    });
    audioPlayer.addEventListener("error", () => {
      console.error("audio file load failed", audioPlayer.src);
      pause();
    });

    window.addEventListener("beforeunload", pause);
    renderScene();
    if (new URLSearchParams(window.location.search).get("autoplay") === "1") {
      setTimeout(play, 600);
    }
  </script>
</body>
</html>
